<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Arcom Purworejo</title>
    <link rel="icon" sizes="100x100" type="image/png" href="assets/logo1.png">
    <link rel="stylesheet" href="css/lupapassword.css">
</head>
<body>
    <div class="forgot-password-container">
        <img src="assets/logo1.png" alt="Arcom Purworejo" class="logo">
        <div class="rcom-purworejo">rcom purworejo</div>
        <h1>-Lupa Password-</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Masukkan Username Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="whatsapp">No.Whatsapp</label>
                <input 
                    type="tel" 
                    id="whatsapp" 
                    name="whatsapp" 
                    placeholder="Masukkan No.Whatsapp Anda"
                    required
                >
            </div>

            <button  type="submit" class="login-btn"><a href="resetpassword.html">SUBMIT</a></button>
        </form>

        <div class="links">
            <a href="login.html">Sudah Punya Akun</a> | <a href="register.html">Buat Akun Baru</a>
        </div>

        <p class="tagline">-Senantiasa Menjaga Kepercayaan Anda-</p>
    </div>
</body>
</html>
