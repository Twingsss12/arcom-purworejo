<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Arcom Purworejo</title>
    <link rel="icon" sizes="100x100" type="image/png" href="assets/logo1.png">
    <link rel="stylesheet" href="css/resetpassword.css">
</head>
<body>
    <div class="reset-password-container">
        <img src="assets/logo1.png" alt="Arcom Purworejo" class="logo">
        <div class="rcom-purworejo">rcom purworejo</div>
        
        <h1>-Lupa Password-</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="old-password">Old Password</label>
                <input 
                    type="password" 
                    id="old-password" 
                    name="old-password" 
                    placeholder="Masukkan Password Lama"
                    required
                >
            </div>

            <div class="form-group">
                <label for="new-password">New Password</label>
                <input 
                    type="password" 
                    id="new-password" 
                    name="new-password" 
                    placeholder="Masukkan Password Baru"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirm-password">Current New Password</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    name="confirm-password" 
                    placeholder="Ulangi Password Baru Anda"
                    required
                >
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <p class="setuju">
                    Saya setuju dengan syarat & kebijakan yang sudah ditentukan oleh Toko Arcom Purworejo
                </p>
            </div>

            <button  type="submit" class="submit-btn"><a href="login.html">SUBMIT</a></button>
        </form>

        <p class="tagline">-Senantiasa Menjaga Kepercayaan Anda-</p>
    </div>
</body>
</html>
