<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin  - Arcom Purworejo</title>
    <link rel="icon" sizes="100x100" type="image/png" href="assets/logo1.png">
    <link rel="stylesheet" href="css/loginadmin.css">
</head>
<body>
    <div class="login-container">
        <img src="assets/logo.jpg" alt="Arcom Purworejo" class="logo">
          <div class="rcom-purworejo">rcom purworejo</div>
        
        <h1>-LOGIN-</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Masukkan Username Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Masukkan Password Anda"
                    required
                >
            </div>
            
            <button  type="submit" class="login-btn"><a href="dashboardadmin.html">LOGIN</a></button>
            
        </form>


        <p class="tagline">-Senantiasa Menjaga Kepercayaan Anda-</p>
    </div>
</body>
</html>
