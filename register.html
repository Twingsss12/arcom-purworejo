<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Arcom Purworejo</title>
    <link rel="icon" sizes="100x100" type="image/png" href="assets/logo1.png">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">
        <img src="assets/Logo.png"class="logo">
        <div class="rcom-purworejo">rcom purworejo</div>
        <h1>-REGISTER-</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Masukkan Username Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="whatsapp">No.Whatsapp</label>
                <input 
                    type="tel" 
                    id="whatsapp" 
                    name="whatsapp" 
                    placeholder="Masukkan No.Whatsapp Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Masukkan Password Anda"
                    required
                >
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <p class="setuju">
                    Saya setuju dengan syarat & kebijakan yang sudah ditentukan oleh Toko Arcom Purworejo
                </p>
            </div>

           <button type="submit" class="register-btn"><a href="login.html">REGISTER</a></button>
        </form>

        <div class="links">
            <a href="login.html">Sudah Punya Akun</a> | <a href="lupapassword.html">Lupa Password</a>
        </div>

        <p class="tagline">-Senantiasa Menjaga Kepercayaan Anda-</p>
    </div>
</body>
</html>
