<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Nota Pembelian - Arcom Purworejo</title>
    <link rel="icon" sizes="100x100" type="image/png" href="assets/logo1.png">
    <link rel="stylesheet" href="css/tambahnota.css">
</head>
<body>

        <nav class="navbar">
            <div class="logo">Arcom purworejo</div>
            <div class="nav-links">
                <a href="dashboardadmin.html">BARANG</a>
                <a href="notaadmin.html"  class="active">NOTA</a>
                <a href="#">USER</a>
                <a href="#">SERVICE</a>
                <a href="#">TEKNISI</a>
                <a href="#">RETURN</a>
            </div>
            <div class="nav-icons">
                <span src>⚙️</span>
                <span>👤</span>
            </div>
        </nav>

  <main class="main-content">
        <h1 class="page-title">Edit Nota</h1>
        
        <div class="form-container">
            <form class="form-grid">
                <div class="form-left">

            <div class="form-group">
                <label for="customer-name">Nama Pelanggan</label>
                <input type="text" id="customer-name" placeholder="Isi Nama Pelanggan...">
            </div>

            <div class="form-group">
                <label for="customer-address">Alamat Pelanggan</label>
                <input type="text" id="customer-address" placeholder="Isi Alamat Pelanggan...">
            </div>

            <div class="form-group">
                <label for="cashier-name">Nama Kasir</label>
                <input type="text" id="cashier-name" placeholder="Isi Nama Kasir...">
            </div>

            <div class="form-group">
            <label for="note-code">Kode Nota</label>
            <input type="text" id="note-code" placeholder="Isi Kode Nota...">
        </div>

        <div class="form-group">
            <label for="note-date">Tanggal Nota</label>
            <input type="date" id="note-date">
        </div>  
</div>

<div class="form-right">
<div class="form-group">
    <label>List Pembelian</label>
    <input type="text" placeholder="Isi Pembelian Barang...">
</div>

<div class="form-group">
    <label>Harga</label>
    <input type="number" placeholder="Isi Harga Barang...">
</div>

<div class="form-group">
    <label>Jumlah</label>
    <input type="number" placeholder="Isi Jumlah Barang...">
</div>

<div class="form-group">
    <label>Total</label>
    <input type="number" placeholder="Isi Total Barang...">
</div>
</div>
</div>
<a href="notaadmin.html" class="submit-button">SUBMIT</a>
    </form>

 
</body>
</html>
